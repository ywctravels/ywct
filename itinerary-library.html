<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Itinerary Library</title><style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:0;
}

.header{
background:#4b3fd6;
color:white;
padding:15px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
margin-top:30px;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:6px;
}

textarea{
height:120px;
}

button{
background:#f5b400;
border:none;
padding:12px;
margin-top:20px;
width:100%;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#e0a800;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:14px;
}

th{
background:#4b3fd6;
color:white;
}

</style></head><body><div class="header">
Itinerary Library
</div><div class="container"><h2>Add New Itinerary</h2><label>Package Name</label>
<input id="package_name">

<label>Day Number</label>
<input id="day_no">

<label>Day Title</label>
<input id="day_title">

<label>Day Plan</label>

<textarea id="day_plan"></textarea><label>Stay City</label>
<input id="stay_city">

<button id="saveBtn">Save Itinerary</button>

<h2>Saved Itineraries</h2><table><thead>
<tr>
<th>Package</th>
<th>Day</th>
<th>Title</th>
<th>Stay</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead><tbody id="itineraryList">
</tbody></table></div></body>
</html>
