<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Trip Manager</title><style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:8px;
}

.section{
margin-top:30px;
}

h3{
border-bottom:2px solid #eee;
padding-bottom:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#4b3fd6;
color:white;
}

input,select{
padding:8px;
width:100%;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:6px 10px;
background:#f5b400;
border:none;
cursor:pointer;
}

button:hover{
background:#e0a800;
}

.danger{
background:#e53935;
color:white;
}

</style></head><body><div class="container"><h2>Trip Manager</h2><div id="guest"></div><!-- BOOKING ACTIONS --><div class="section"><h3>Booking Actions</h3><button onclick="cancelBooking()" class="danger">
Cancel Booking
</button><input id="cancel_charge" placeholder="Cancellation Charge"></div><!-- HOTELS --><div class="section"><h3>Hotels</h3><table><thead>
<tr>
<th>City</th>
<th>Hotel</th>
<th>Checkin</th>
<th>Nights</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead><tbody id="hotelList"></tbody></table><h4>Add Hotel</h4><input id="city" placeholder="City"><input id="hotel_name" placeholder="Hotel"><input type="date" id="checkin"><input id="nights" placeholder="Nights"><select id="meal_plan">
<option>EP</option>
<option>CP</option>
<option>MAP</option>
<option>AP</option>
</select><button onclick="addHotel()">Add Hotel</button>

</div><!-- VEHICLES --><div class="section"><h3>Vehicles</h3><table><thead>
<tr>
<th>Vehicle</th>
<th>Driver</th>
<th>Pickup</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead><tbody id="vehicleList"></tbody></table><h4>Assign Vehicle</h4><select id="vehicleSelect"></select>

<input type="date" id="pickup_date"><button onclick="assignVehicle()">Assign Vehicle</button>

</div><!-- PAYMENTS --><div class="section"><h3>Customer Payments</h3><table><thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Mode</th>
</tr>
</thead><tbody id="paymentList"></tbody></table></div><!-- VOUCHER --><div class="section"><h3>Voucher</h3><button onclick="openVoucher()">Open Voucher</button>

</div></div><script>

const API="https://script.google.com/macros/s/AKfycbyYeZMcv92PvMShxHL5e0HEmddLMFsZY4AnPZAlNrgXQVXLh5nlCCgsqHK5mXwYcGe7mw/exec";

const params=new URLSearchParams(window.location.search);
const bookingId=params.get("booking");

loadBooking();
loadHotels();
loadVehicles();
loadTransport();

/* BOOKING DETAILS */

function loadBooking(){

fetch(API+"?action=getBooking&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

document.getElementById("guest").innerHTML=`

<b>Booking:</b> ${data[0]} <br>
<b>Guest:</b> ${data[3]} <br>
<b>Mobile:</b> ${data[4]} <br>
<b>Tour:</b> ${data[8]} → ${data[9]}

`;

});

}

/* HOTELS */

function loadHotels(){

fetch(API+"?action=getVoucher&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

let html="";

data.hotels.forEach(h=>{

html+=`
<tr>
<td>${h.city}</td>
<td>${h.hotel}</td>
<td>${h.checkin}</td>
<td>${h.nights}</td>

<td>
<button onclick="editHotel('${h.id}')">Edit</button>
</td>

<td>
<button class="danger" onclick="deleteHotel('${h.id}')">
Delete
</button>
</td>

</tr>
`;

});

document.getElementById("hotelList").innerHTML=html;

});

}

/* ADD HOTEL */

function addHotel(){

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"addHotel",
booking_id:bookingId,
city:city.value,
hotel_name:hotel_name.value,
checkin_date:checkin.value,
nights:nights.value,
meal_plan:meal_plan.value,
auto_rate:"",
final_rate:"",
total_cost:""

})

}).then(()=>{
alert("Hotel Added");
loadHotels();
});

}

/* DELETE HOTEL */

function deleteHotel(id){

if(!confirm("Delete this hotel?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"deleteHotel",
id:id
})
}).then(()=>{
loadHotels();
});

}

/* VEHICLES */

function loadVehicles(){

fetch(API+"?action=getVehicles")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(v=>{

html+=`<option value="${v.vehicle_id}">
${v.vehicle_number} - ${v.driver_name}
</option>`;

});

vehicleSelect.innerHTML=html;

});

}

/* ASSIGN VEHICLE */

function assignVehicle(){

const v=vehicleSelect.options[vehicleSelect.selectedIndex].text;

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"assignVehicle",
booking_id:bookingId,
vehicle_id:vehicleSelect.value,
vehicle_number:v.split(" - ")[0],
driver_name:v.split(" - ")[1],
driver_phone:"",
pickup_date:pickup_date.value,
drop_date:"",
remarks:""

})

}).then(()=>{
alert("Vehicle Assigned");
loadTransport();
});

}

/* LOAD TRANSPORT */

function loadTransport(){

fetch(API+"?action=getTripTransport&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(v=>{

html+=`
<tr>
<td>${v.vehicle_number}</td>
<td>${v.driver_name}</td>
<td>${v.pickup_date}</td>

<td>
<button onclick="editVehicle('${v.id}')">Edit</button>
</td>

<td>
<button class="danger"
onclick="deleteVehicle('${v.id}')">
Delete
</button>
</td>

</tr>
`;

});

vehicleList.innerHTML=html;

});

}

/* BOOKING CANCEL */

function cancelBooking(){

const charge=document.getElementById("cancel_charge").value;

if(!confirm("Cancel booking?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"cancelBooking",
booking_id:bookingId,
charge:charge

})

}).then(()=>{
alert("Booking Cancelled");
});

}

/* VOUCHER */

function openVoucher(){

window.open("voucher.html?booking_id="+bookingId);

}

</script></body>
</html>
