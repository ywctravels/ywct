<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trip Manager</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:8px;
}

.section{
margin-top:30px;
}

h3{
border-bottom:2px solid #eee;
padding-bottom:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#4b3fd6;
color:white;
}

input,select{
padding:8px;
margin-top:5px;
width:100%;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#f5b400;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#e0a800;
}

</style>

</head>

<body>

<div class="container">

<h2>Trip Manager</h2>

<div id="guest"></div>

<!-- HOTELS -->

<div class="section">

<h3>Hotels</h3>

<table>

<thead>
<tr>
<th>City</th>
<th>Hotel</th>
<th>Checkin</th>
<th>Checkout</th>
<th>Nights</th>
<th>Meal</th>
</tr>
</thead>

<tbody id="hotelList"></tbody>

</table>

<h4>Add Hotel</h4>

<input id="city" placeholder="City">

<input id="hotel_name" placeholder="Hotel Name">

<input id="room_type" placeholder="Room Type">

<select id="meal_plan">
<option>EP</option>
<option>CP</option>
<option>MAP</option>
<option>AP</option>
</select>

<input type="date" id="checkin">

<input type="date" id="checkout">

<input id="nights" placeholder="Nights">

<button onclick="addHotel()">Add Hotel</button>

</div>

<!-- VEHICLES -->

<div class="section">

<h3>Vehicles</h3>

<table>

<thead>
<tr>
<th>Vehicle</th>
<th>Driver</th>
<th>Phone</th>
<th>Pickup</th>
</tr>
</thead>

<tbody id="vehicleList"></tbody>

</table>

<h4>Assign Vehicle</h4>

<select id="vehicleSelect"></select>

<input type="date" id="pickup_date">

<button onclick="assignVehicle()">Assign Vehicle</button>

</div>

<!-- PAYMENTS -->

<div class="section">

<h3>Customer Payments</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Mode</th>
</tr>
</thead>

<tbody id="paymentList"></tbody>

</table>

</div>

<!-- VOUCHER -->

<div class="section">

<h3>Voucher</h3>

<button onclick="openVoucher()">Generate Voucher</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyYeZMcv92PvMShxHL5e0HEmddLMFsZY4AnPZAlNrgXQVXLh5nlCCgsqHK5mXwYcGe7mw/exec";

const urlParams = new URLSearchParams(window.location.search);
const bookingId = urlParams.get("booking");

loadBooking();
loadHotels();
loadVehicles();
loadTransport();

function loadBooking(){

fetch(API+"?action=getBooking&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

document.getElementById("guest").innerHTML=`
<b>Booking ID:</b> ${data[0]} <br>
<b>Guest:</b> ${data[3]} <br>
<b>Mobile:</b> ${data[4]} <br>
<b>Tour:</b> ${data[8]} → ${data[9]}
`;

});

}

function loadHotels(){

fetch(API+"?action=getVoucher&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

let html="";

data.hotels.forEach(h=>{

html+=`
<tr>
<td>${h.city}</td>
<td>${h.hotel}</td>
<td>${h.checkin}</td>
<td>${h.checkout}</td>
<td>${h.nights}</td>
<td>${h.meal}</td>
</tr>
`;

});

document.getElementById("hotelList").innerHTML=html;

});

}

function addHotel(){

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"addHotel",

booking_id:bookingId,

city:document.getElementById("city").value,

hotel_name:document.getElementById("hotel_name").value,

room_type:document.getElementById("room_type").value,

meal_plan:document.getElementById("meal_plan").value,

checkin_date:document.getElementById("checkin").value,

checkout_date:document.getElementById("checkout").value,

nights:document.getElementById("nights").value,

auto_rate:"",
final_rate:"",
total_cost:""

})

}).then(()=>{

alert("Hotel Added");

loadHotels();

});

}

function loadVehicles(){

fetch(API+"?action=getVehicles")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(v=>{

html+=`<option value="${v.vehicle_id}">
${v.vehicle_number} - ${v.driver_name}
</option>`;

});

document.getElementById("vehicleSelect").innerHTML=html;

});

}

function assignVehicle(){

const vehicle=document.getElementById("vehicleSelect");

const text=vehicle.options[vehicle.selectedIndex].text;

const number=text.split(" - ")[0];

const driver=text.split(" - ")[1];

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"assignVehicle",

booking_id:bookingId,

vehicle_id:vehicle.value,

vehicle_number:number,

driver_name:driver,

driver_phone:"",

pickup_date:document.getElementById("pickup_date").value,

drop_date:"",

remarks:""

})

}).then(()=>{

alert("Vehicle Assigned");

loadTransport();

});

}

function loadTransport(){

fetch(API+"?action=getTripTransport&booking_id="+bookingId)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(v=>{

html+=`
<tr>
<td>${v.vehicle_number}</td>
<td>${v.driver_name}</td>
<td>${v.driver_phone}</td>
<td>${v.pickup_date}</td>
</tr>
`;

});

document.getElementById("vehicleList").innerHTML=html;

});

}

function openVoucher(){

window.open("voucher.html?booking_id="+bookingId);

}

</script>

</body>
</html>
