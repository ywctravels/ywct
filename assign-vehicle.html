<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assign Vehicle</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#f5b400;
border:none;
padding:12px;
width:100%;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Assign Vehicle</h2>

<label>Booking ID</label>
<input id="booking_id">

<label>Vehicle Type</label>
<input id="vehicle_type">

<label>Vehicle Number</label>
<input id="vehicle_number">

<label>Driver Name</label>
<input id="driver_name">

<label>Driver Phone</label>
<input id="driver_phone">

<button onclick="assignVehicle()">Assign Vehicle</button>

<script>

const API_URL="YOUR_API_URL";

function assignVehicle(){

const data={

action:"assignVehicle",

booking_id:document.getElementById("booking_id").value,

vehicle_type:document.getElementById("vehicle_type").value,

vehicle_number:document.getElementById("vehicle_number").value,

driver_name:document.getElementById("driver_name").value,

driver_phone:document.getElementById("driver_phone").value

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

}

</script>

</body>
</html>
