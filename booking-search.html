<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Booking</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
margin-top:10px;
padding:10px;
background:#4b3fd6;
color:white;
border:none;
cursor:pointer;
width:100%;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#4b3fd6;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Search Booking</h2>

<input id="query" placeholder="Booking ID / Guest Name / Mobile">

<button onclick="searchBooking()">Search</button>

<table>

<thead>
<tr>
<th>Booking ID</th>
<th>Guest</th>
<th>Mobile</th>
<th>Tour Start</th>
<th>Tour End</th>
<th>Status</th>
<th>Open</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>

</div>

<script>

const API="YOUR_API_URL";

function searchBooking(){

const q=document.getElementById("query").value;

fetch(API+"?action=searchBooking&query="+q)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(b=>{

html+=`
<tr>

<td>${b.booking_id}</td>
<td>${b.guest}</td>
<td>${b.mobile}</td>
<td>${b.tour_start}</td>
<td>${b.tour_end}</td>
<td>${b.status}</td>

<td>
<button onclick="openTrip('${b.booking_id}')">
Open
</button>
</td>

</tr>
`;

});

document.getElementById("results").innerHTML=html;

});

}

function openTrip(id){

window.location="trip-manager.html?booking="+id;

}

</script>

</body>
</html>
