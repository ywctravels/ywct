<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Booking</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
background:#f5b400;
border:none;
width:100%;
font-weight:bold;
cursor:pointer;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#4b3fd6;
color:white;
}

</style>

</head>

<body>

<h2>Search Booking</h2>

<input id="query" placeholder="Booking ID / Guest Name / Mobile">

<button onclick="searchBooking()">Search</button>

<table id="result">

<thead>

<tr>
<th>Booking ID</th>
<th>Guest</th>
<th>Mobile</th>
<th>Tour Start</th>
<th>Tour End</th>
<th>Status</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyYeZMcv92PvMShxHL5e0HEmddLMFsZY4AnPZAlNrgXQVXLh5nlCCgsqHK5mXwYcGe7mw/exec";

function searchBooking(){

let q=document.getElementById("query").value;

fetch(API_URL+"?action=searchBooking&query="+q)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(b=>{

html+=`
<tr>
<td>${b.booking_id}</td>
<td>${b.guest}</td>
<td>${b.mobile}</td>
<td>${b.tour_start}</td>
<td>${b.tour_end}</td>
<td>${b.status}</td>
</tr>
`;

});

document.querySelector("#result tbody").innerHTML=html;

});

}

</script>

</body>
</html>
