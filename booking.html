<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Booking</title>

<style>

body{
font-family:Arial;
background:white;
padding:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:5px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
background:#f5b400;
border:none;
padding:12px;
width:100%;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#e0a800;
}

#msg{
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<h2>Create Booking</h2>

<label>Guest Name</label>
<input id="guest_name">

<label>Mobile</label>
<input id="mobile">

<label>Email</label>
<input id="email">

<div class="row">

<div>
<label>Adults</label>
<input id="adults" type="number" value="1">
</div>

<div>
<label>Children</label>
<input id="children" type="number" value="0">
</div>

</div>

<div class="row">

<div>
<label>Tour Start</label>
<input id="tour_start" type="date">
</div>

<div>
<label>Tour End</label>
<input id="tour_end" type="date">
</div>

</div>

<label>Total Package Cost</label>
<input id="package_cost">

<label>Advance Paid</label>
<input id="advance_paid">

<label>Notes</label>
<input id="notes">

<button onclick="createBooking()">Create Booking</button>

<div id="msg"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyYeZMcv92PvMShxHL5e0HEmddLMFsZY4AnPZAlNrgXQVXLh5nlCCgsqHK5mXwYcGe7mw/exec";

function createBooking(){

let msg=document.getElementById("msg");

msg.innerHTML="Processing...";
msg.style.color="blue";

const packageCost=document.getElementById("package_cost").value;
const advance=document.getElementById("advance_paid").value;

const data={

action:"createBooking",

guest_name:document.getElementById("guest_name").value,
mobile:document.getElementById("mobile").value,
email:document.getElementById("email").value,
adults:document.getElementById("adults").value,
children:document.getElementById("children").value,
tour_start:document.getElementById("tour_start").value,
tour_end:document.getElementById("tour_end").value,
package_cost:packageCost,
advance_paid:advance,
balance:packageCost-advance,
notes:document.getElementById("notes").value

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

.then(res=>res.json())
.then(res=>{

if(res.status=="success"){

msg.style.color="green";

msg.innerHTML="Booking Created ✔ <br> Booking ID: "+res.booking_id;

}else{

msg.style.color="red";
msg.innerHTML="Booking failed";

}

})

.catch(()=>{

msg.style.color="red";
msg.innerHTML="Server error";

});

}

</script>

</body>
</html>
