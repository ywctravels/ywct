<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yes We Care Travels CRM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

/* HEADER */

.header{
background:#4b3fd6;
color:white;
padding:10px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-left{
display:flex;
align-items:center;
}

.logo-left img{
height:45px;
margin-right:10px;
}

.logo-right img{
height:35px;
}

.company-text h2{
margin:0;
font-size:18px;
}

.company-text p{
margin:0;
font-size:11px;
opacity:0.8;
}

/* LAYOUT */

.layout{
display:flex;
height:calc(100vh - 65px);
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#1f1f2e;
padding:20px;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
cursor:pointer;
border-radius:6px;
margin-bottom:8px;
font-size:14px;
}

.sidebar button:hover{
background:#333356;
}

/* CONTENT */

.content{
flex:1;
padding:15px;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
border-radius:8px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo-left">

<img src="images/logo-yes-we-care-travels-1.png">

<div class="company-text">
<h2>Yes We Care Travels</h2>
<p>Operated by P&R Hospitality Management Services</p>
</div>

</div>

<div class="logo-right">
<img src="images/logo-pr-hospitality.png">
</div>

</div>

<div class="layout">

<div class="sidebar">

<button onclick="loadPage('booking.html')">Create Booking</button>

<button onclick="loadPage('customer-payment.html')">Customer Payment</button>

<button onclick="loadPage('supplier-payment.html')">Supplier Payment</button>

<button onclick="loadPage('voucher.html')">Generate Voucher</button>

<button onclick="loadPage('report.html')">Reports</button>

</div>

<div class="content">

<iframe id="frame"></iframe>

</div>

</div>

<script>

function loadPage(page){
document.getElementById("frame").src = page;
}

</script>

</body>
</html>
