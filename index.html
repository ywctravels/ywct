<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Yes We Care Travels CRM</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

/* LOGIN */

#loginBox{
width:320px;
margin:120px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

#loginBox input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

#loginBox button{
margin-top:15px;
padding:10px;
width:100%;
background:#4b3fd6;
color:white;
border:none;
cursor:pointer;
}

#msg{
margin-top:10px;
font-size:13px;
color:red;
}

/* HEADER */

.header{
background:#4b3fd6;
color:white;
padding:10px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-left{
display:flex;
align-items:center;
}

.logo-left img{
height:45px;
margin-right:10px;
}

.logo-right img{
height:35px;
}

.company-text h2{
margin:0;
font-size:18px;
}

.company-text p{
margin:0;
font-size:11px;
opacity:0.8;
}

/* LAYOUT */

.layout{
display:flex;
height:calc(100vh - 65px);
}

.sidebar{
width:220px;
background:#1f1f2e;
padding:20px;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
cursor:pointer;
border-radius:6px;
margin-bottom:8px;
font-size:14px;
}

.sidebar button:hover{
background:#333356;
}

.content{
flex:1;
padding:15px;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
border-radius:8px;
}

.logout{
background:#f44336;
color:white;
}

</style></head><body><!-- LOGIN BOX --><div id="loginBox"><h2>Login</h2><input id="username" placeholder="Username"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

<div id="msg"></div></div><!-- DASHBOARD --><div id="dashboard" style="display:none"><div class="header"><div class="logo-left"><img src="images/logo-yes-we-care-travels-1.png"><div class="company-text">
<h2>Yes We Care Travels</h2>
<p>Operated by P&R Hospitality Management Services</p>
</div></div><div class="logo-right">
<img src="images/logo-pr-hospitality.png">
</div></div><div class="layout"><div class="sidebar" id="menu"><button onclick="loadPage('booking.html')" data-role="operator">Create Booking</button>

<button onclick="loadPage('customer-payment.html')" data-role="accounts">Customer Payment</button>

<button onclick="loadPage('assign-hotel.html')" data-role="operator">Assign Hotel</button>

<button onclick="loadPage('assign-vehicle.html')" data-role="operator">Assign Vehicle</button>

<button onclick="loadPage('supplier-payment.html')" data-role="accounts">Supplier Payment</button>

<button onclick="loadPage('booking-search.html')" data-role="operator">Search Booking</button>

<button onclick="loadPage('voucher.html')" data-role="operator">Generate Voucher</button>

<button onclick="loadPage('report.html')" data-role="accounts">Reports</button>

<button class="logout" onclick="logout()">Logout</button>

</div><div class="content"><iframe id="frame"></iframe></div></div></div><script>

const API="https://script.google.com/macros/s/AKfycbyYeZMcv92PvMShxHL5e0HEmddLMFsZY4AnPZAlNrgXQVXLh5nlCCgsqHK5mXwYcGe7mw/exec";

/* LOGIN */

function login(){

const data={

action:"login",
username:document.getElementById("username").value,
password:document.getElementById("password").value

};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

.then(res=>res.json())

.then(res=>{

if(res.status=="success"){

sessionStorage.setItem("loggedIn","true");

sessionStorage.setItem("admin",res.is_admin);
sessionStorage.setItem("operator",res.is_operator);
sessionStorage.setItem("accounts",res.is_accounts);

startDashboard();

}else{

document.getElementById("msg").innerText="Invalid Login";

}

});

}

/* DASHBOARD START */

function startDashboard(){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

applyPermissions();

}

/* PERMISSIONS */

function applyPermissions(){

const admin=sessionStorage.getItem("admin");
const operator=sessionStorage.getItem("operator");
const accounts=sessionStorage.getItem("accounts");

const buttons=document.querySelectorAll("#menu button[data-role]");

buttons.forEach(btn=>{

let role=btn.getAttribute("data-role");

if(admin=="yes"){
btn.style.display="block";
return;
}

if(role=="operator" && operator!="yes"){
btn.style.display="none";
}

if(role=="accounts" && accounts!="yes"){
btn.style.display="none";
}

});

}

/* LOAD PAGE */

function loadPage(page){
document.getElementById("frame").src = page;
}

/* LOGOUT */

function logout(){

sessionStorage.clear();

location.reload();

}

/* DIRECT ACCESS BLOCK */

if(sessionStorage.getItem("loggedIn")=="true"){
startDashboard();
}

</script></body>
</html>
